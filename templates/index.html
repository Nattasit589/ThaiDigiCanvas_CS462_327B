<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Digit Collector</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-4xl">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-emerald-400 mb-2">Thai Digit Collector</h1>
            <p class="text-slate-300 text-sm">Collect handwritten digits 11–15 for MNIST-style dataset</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- Canvas Section -->
            <div class="lg:col-span-3">
                <div class="bg-slate-800/50 border border-emerald-400/20 rounded-2xl p-6 backdrop-blur">
                    <div class="flex flex-col items-center gap-4">
                        <div class="bg-black rounded-xl overflow-hidden shadow-lg">
                            <canvas id="drawCanvas" width="280" height="280" class="cursor-crosshair"></canvas>
                        </div>
                        
                        <div class="flex gap-3 w-full justify-center">
                            <button id="clearBtn" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-200 rounded-lg font-medium transition">
                                Clear
                            </button>
                            <button id="saveBtn" class="px-6 py-2 bg-emerald-500 hover:bg-emerald-600 text-slate-900 font-bold rounded-lg transition">
                                Save
                            </button>
                        </div>

                        <div id="status" class="text-emerald-400 font-semibold text-sm min-h-6" aria-live="polite"></div>
                        <p class="text-slate-400 text-xs text-center">Tip: Hold and draw smoothly for best samples</p>
                    </div>
                </div>
            </div>

            <!-- Label Selection Sidebar -->
            <div class="lg:col-span-1">
                <div class="bg-slate-800/50 border border-emerald-400/20 rounded-2xl p-6 backdrop-blur">
                    <h2 class="text-emerald-400 font-bold mb-4 text-sm uppercase">Select Label</h2>
                    
                    <div id="label-select" class="space-y-2">
                        <label class="flex items-center gap-3 p-3 bg-slate-700/50 hover:bg-slate-700 rounded-lg cursor-pointer transition">
                            <input type="radio" name="label" value="11" checked class="w-4 h-4">
                            <span class="text-slate-200 font-medium">11</span>
                        </label>
                        <label class="flex items-center gap-3 p-3 bg-slate-700/50 hover:bg-slate-700 rounded-lg cursor-pointer transition">
                            <input type="radio" name="label" value="12" class="w-4 h-4">
                            <span class="text-slate-200 font-medium">12</span>
                        </label>
                        <label class="flex items-center gap-3 p-3 bg-slate-700/50 hover:bg-slate-700 rounded-lg cursor-pointer transition">
                            <input type="radio" name="label" value="13" class="w-4 h-4">
                            <span class="text-slate-200 font-medium">13</span>
                        </label>
                        <label class="flex items-center gap-3 p-3 bg-slate-700/50 hover:bg-slate-700 rounded-lg cursor-pointer transition">
                            <input type="radio" name="label" value="14" class="w-4 h-4">
                            <span class="text-slate-200 font-medium">14</span>
                        </label>
                        <label class="flex items-center gap-3 p-3 bg-slate-700/50 hover:bg-slate-700 rounded-lg cursor-pointer transition">
                            <input type="radio" name="label" value="15" class="w-4 h-4">
                            <span class="text-slate-200 font-medium">15</span>
                        </label>
                    </div>

                    <p class="text-slate-400 text-xs mt-4">Files saved to <code class="bg-slate-900/50 px-2 py-1 rounded text-emerald-300">dataset/&lt;label&gt;/</code></p>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="text-center text-slate-400 text-xs mt-8">
            Local only — running on the machine. Be careful if exposed via ngrok.
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');

        ctx.fillStyle = 'black';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = 'white';
        ctx.lineWidth = 15;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        let drawing = false;

        function startDrawing(e) {
            drawing = true;
            draw(e);
        }

        function stopDrawing() {
            drawing = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function clearCanvas() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            document.getElementById('status').textContent = '';
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);
        canvas.addEventListener('mousemove', draw);

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousedown', { clientX: touch.clientX, clientY: touch.clientY });
            canvas.dispatchEvent(mouseEvent);
        });
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            const mouseEvent = new MouseEvent('mouseup');
            canvas.dispatchEvent(mouseEvent);
        });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousemove', { clientX: touch.clientX, clientY: touch.clientY });
            canvas.dispatchEvent(mouseEvent);
        });

        document.getElementById('clearBtn').addEventListener('click', clearCanvas);

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const label = document.querySelector('input[name="label"]:checked').value;
            const dataURL = canvas.toDataURL('image/png');
            const base64Data = dataURL.split(',')[1];

            const payload = { label: label, image: base64Data };
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = 'Saving...';

            try {
                const response = await fetch('/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (response.ok) {
                    const result = await response.json();
                    statusDiv.textContent = `Saved! File: ${result.filename}`;
                    clearCanvas();
                } else {
                    statusDiv.textContent = 'Save failed.';
                }
            } catch (err) {
                statusDiv.textContent = 'Network error.';
                console.error(err);
            }
        });
    </script>
</body>
</html>
