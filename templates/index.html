<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Thai Digit Collector</title>
    <style>
        :root{
            --bg:#0f1724; --card:#0b1220; --accent:#6ee7b7; --muted:#94a3b8; --glass:rgba(255,255,255,0.04);
            --radius:12px; --maxw:760px;
        }
        html,body{height:100%;margin:0;font-family:Inter,ui-sans-serif,system-ui,Segoe UI,Roboto,'Helvetica Neue',Arial;}
        body{display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#071126 0%, #08122a 100%);color:#e6eef6}
        .wrap{width:95%;max-width:var(--maxw);background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));box-shadow:0 10px 30px rgba(2,6,23,0.6);border-radius:16px;padding:22px;display:grid;grid-template-columns:1fr 360px;gap:20px}
        header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between}
        h1{margin:0;font-size:18px;letter-spacing:0.4px}
        .hint{color:var(--muted);font-size:13px}
        .canvas-card{background:var(--card);border-radius:var(--radius);padding:18px;display:flex;flex-direction:column;align-items:center}
        canvas{background:#000;border-radius:10px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.02);cursor:crosshair}
        .controls{display:flex;align-items:center;gap:10px;margin-top:12px}
        .btn{background:linear-gradient(90deg,var(--accent),#34d399);border:none;color:#042022;padding:8px 14px;border-radius:10px;font-weight:600;cursor:pointer}
        .btn.ghost{background:transparent;color:var(--accent);border:1px solid rgba(255,255,255,0.04)}
        .labels{display:flex;flex-wrap:wrap;gap:8px}
        .label-chip{background:var(--glass);padding:6px 10px;border-radius:999px;color:var(--muted);cursor:pointer}
        .label-chip input{margin-right:6px}
        .aside{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));padding:14px;border-radius:12px}
        #status{margin-top:12px;color:var(--accent);font-weight:600}
        footer{grid-column:1/-1;text-align:center;color:var(--muted);font-size:12px;margin-top:6px}
        @media(max-width:880px){.wrap{grid-template-columns:1fr;}}
    </style>
</head>
<body>
    <div class="wrap">
        <header>
            <div>
                <h1>Thai Digit Collector</h1>
                <div class="hint">Collect handwritten digits 11–15 (MNIST-style)</div>
            </div>
            <div class="hint">Draw with mouse or touch — press <strong>Save</strong> to store</div>
        </header>

        <section class="canvas-card">
            <canvas id="drawCanvas" width="280" height="280"></canvas>
            <div class="controls">
                <button id="clearBtn" class="btn ghost">Clear</button>
                <button id="saveBtn" class="btn">Save</button>
                <div id="status" aria-live="polite"></div>
            </div>
            <div style="margin-top:8px;color:var(--muted);font-size:13px">Tip: Hold and draw smoothly for best samples</div>
        </section>

        <aside class="aside">
            <div style="font-weight:700;margin-bottom:8px">Label</div>
            <div id="label-select" class="labels">
                <label class="label-chip"><input type="radio" name="label" value="11" checked>11</label>
                <label class="label-chip"><input type="radio" name="label" value="12">12</label>
                <label class="label-chip"><input type="radio" name="label" value="13">13</label>
                <label class="label-chip"><input type="radio" name="label" value="14">14</label>
                <label class="label-chip"><input type="radio" name="label" value="15">15</label>
            </div>
            <div style="margin-top:12px;color:var(--muted);font-size:13px">Saved files land in the <code>dataset/&lt;label&gt;/</code> folder.</div>
        </aside>

        <footer>Local only — running on the machine. Be careful if you expose via ngrok.</footer>
    </div>

    <script>
        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');

        ctx.fillStyle = 'black';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = 'white';
        ctx.lineWidth = 15;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        let drawing = false;

        function startDrawing(e) {
            drawing = true;
            draw(e);
        }

        function stopDrawing() {
            drawing = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function clearCanvas() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            document.getElementById('status').textContent = '';
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);
        canvas.addEventListener('mousemove', draw);

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousedown', { clientX: touch.clientX, clientY: touch.clientY });
            canvas.dispatchEvent(mouseEvent);
        });
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            const mouseEvent = new MouseEvent('mouseup');
            canvas.dispatchEvent(mouseEvent);
        });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousemove', { clientX: touch.clientX, clientY: touch.clientY });
            canvas.dispatchEvent(mouseEvent);
        });

        document.getElementById('clearBtn').addEventListener('click', clearCanvas);

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const label = document.querySelector('input[name="label"]:checked').value;
            const dataURL = canvas.toDataURL('image/png');
            const base64Data = dataURL.split(',')[1];

            const payload = { label: label, image: base64Data };
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = 'Saving...';

            try {
                const response = await fetch('/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (response.ok) {
                    const result = await response.json();
                    statusDiv.textContent = `Saved! File: ${result.filename}`;
                    clearCanvas();
                } else {
                    statusDiv.textContent = 'Save failed.';
                }
            } catch (err) {
                statusDiv.textContent = 'Network error.';
                console.error(err);
            }
        });
    </script>
</body>
</html>
